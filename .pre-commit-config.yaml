
ci:
    autofix_commit_msg: |
        chore(pre-commit): auto-fix pre-commit hook failings; for more
        information, see https://pre-commit.ci
    autofix_prs: true
    autoupdate_branch: ""
    autoupdate_commit_msg: "chore(pre-commit): run pre-commit autoupdate"
    autoupdate_schedule: weekly
    skip: []
    submodules: false
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-added-large-files
        args: ["--maxkb=10000"]
    -   id: check-ast
    -   id: check-case-conflict
    -   id: check-docstring-first
    -   id: check-yaml
        args: ["--allow-multiple-documents"]
    -   id: check-toml
    -   id: end-of-file-fixer
    -   id: mixed-line-ending
    -   id: name-tests-test
        args: ["--pytest-test-first"]
    -   id: pretty-format-json
        args: ["--autofix", "--no-sort-keys",  "--indent", "4"]
    -   id: trailing-whitespace
    -   id: check-executables-have-shebangs
        files: \.sh$
    -   id: detect-private-key
-   repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
    -   id: markdownlint
        args: [--fix]
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
    -   id: ruff-check
        args: ["--fix"]
    -   id: ruff-format
-   repo: https://github.com/rubik/xenon
    rev: v0.9.3
    hooks:
    -   id: xenon
        args: [
            "--max-absolute=B",
            "--max-modules=B",
            "--max-average=A"
        ]
-   repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.14
    hooks:
    -   id: uv-lock
-   repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
    -   id: vulture
        args: ["--min-confidence", "80"]
-   repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
    -   id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package.lock.json
-   repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
    -   id: actionlint
-   repo: https://github.com/crate-ci/typos
    rev: v1
    hooks:
    -   id: typos
        args: ["--force-exclude"]
-   repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.2
    hooks:
    -   id: commitizen
-   repo: https://github.com/jorisroovers/gitlint
    rev:  v0.19.1
    hooks:
    -   id: gitlint
-   repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
    -   id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict, --force-scope, feat, fix, chore, test, custom]
-   repo: https://github.com/etiennebacher/jarl-pre-commit
    rev: 0.5.0
    hooks:
    -   id: jarl-check
        args: ["--fix", "--allow-dirty"]
-   repo: https://github.com/posit-dev/air-pre-commit
    rev: 0.9.0
    hooks:
    -   id: air-format
